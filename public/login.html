<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Marrakech - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #d35400;
            --primary-light: #e67e22;
            --primary-dark: #a04000;
            --secondary: #27ae60;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --white: #ffffff;
            --gradient: linear-gradient(135deg, #d35400 0%, #e67e22 100%);
            --shadow: 0 10px 40px rgba(211, 84, 0, 0.2);
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }

        .login-header {
            background: var(--gradient);
            padding: 40px 30px;
            text-align: center;
            color: var(--white);
            position: relative;
        }

        .login-header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 40px;
            background: var(--white);
            border-radius: 50% 50% 0 0;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            backdrop-filter: blur(10px);
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .login-body {
            padding: 40px 30px 30px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 18px;
        }

        .form-control {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(211, 84, 0, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: var(--gradient);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message.show {
            display: flex;
        }

        .login-footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 13px;
            border-top: 1px solid #ecf0f1;
        }

        .language-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .lang-btn.active, .lang-btn:hover {
            background: white;
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .login-container {
                border-radius: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }
            
            .login-body {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="language-selector">
        <button class="lang-btn active" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('ar')">عربي</button>
    </div>

    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">
                <i class="fas fa-car"></i>
            </div>
            <h1 id="title">Transfer Marrakech</h1>
            <p id="subtitle">Gestion des transferts aéroport & hôtel</p>
        </div>
        
        <div class="login-body">
            <div class="error-message" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Identifiants incorrects</span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username" id="labelUser">Nom d'utilisateur</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password" id="labelPass">Mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    <span id="btnText">Se connecter</span>
                </button>
            </form>
        </div>
        
        <div class="login-footer">
            <span id="footerText">© 2025 Transfer Marrakech - Tous droits réservés</span>
        </div>
    </div>

    <script>
        const translations = {
            fr: {
                title: 'Transfer Marrakech',
                subtitle: 'Gestion des transferts aéroport & hôtel',
                username: 'Nom d\'utilisateur',
                password: 'Mot de passe',
                login: 'Se connecter',
                error: 'Identifiants incorrects',
                footer: '© 2025 Transfer Marrakech - Tous droits réservés'
            },
            ar: {
                title: 'نقل مراكش',
                subtitle: 'إدارة النقل من والى المطار',
                username: 'اسم المستخدم',
                password: 'كلمة المرور',
                login: 'تسجيل الدخول',
                error: 'بيانات الدخول غير صحيحة',
                footer: '© 2025 نقل مراكش - جميع الحقوق محفوظة'
            }
        };

        let currentLang = 'fr';

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const t = translations[lang];
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('labelUser').textContent = t.username;
            document.getElementById('labelPass').textContent = t.password;
            document.getElementById('btnText').textContent = t.login;
            document.getElementById('errorText').textContent = t.error;
            document.getElementById('footerText').textContent = t.footer;
            
            if (lang === 'ar') {
                document.body.dir = 'rtl';
            } else {
                document.body.dir = 'ltr';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    document.getElementById('errorMsg').classList.add('show');
                }
            } catch (err) {
                document.getElementById('errorMsg').classList.add('show');
            }
        });
    </script>
</body>
</html>
